services:
  postgres:
    container_name: postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-echobase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-echobase}
      POSTGRES_DB: ${POSTGRES_DB:-echobase}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-echobase} -d ${POSTGRES_DB:-echobase}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    container_name: redis
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  next-js-app:
    container_name: next-js-app
    build:
      context: .
      dockerfile: apps/next-js-app/Dockerfile
      target: prod
    restart: unless-stopped
    environment:
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  hono-api:
    container_name: hono-api
    build:
      context: .
      dockerfile: apps/hono-api/Dockerfile
      target: prod
    restart: unless-stopped
    env_file:
      - ./apps/hono-api/.env
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-echobase}:${POSTGRES_PASSWORD:-echobase}@postgres:5432/${POSTGRES_DB:-echobase}
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  pipecat-ws:
    container_name: pipecat-ws
    build:
      context: ./apps/pipecat-ws
      target: prod
    restart: unless-stopped
    env_file:
      - ./apps/pipecat-ws/.env
    environment:
      PORT: 8000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      HONO_API_URL: http://hono-api:3001
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  bullmq-worker:
    container_name: bullmq-worker
    build:
      context: ./apps/bullmq-worker
      target: prod
    restart: unless-stopped
    env_file:
      - ./apps/bullmq-worker/.env
    environment:
      REDIS_URL: redis://redis:6379
      QUEUE_NAME: tasks
      HONO_API_URL: http://hono-api:3001
    depends_on:
      redis:
        condition: service_healthy
      hono-api:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
